name: Build and Update Android Release

on:
  # 1. 当一个 Release 被发布时触发
  # release:
  #   types: [published]
  
  # 2. 允许手动触发，并要求输入一个目标 tag
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'The existing tag to build for and update the release (e.g., v1.0.0)'
        required: true
        default: 'v4.6.0'

permissions:
  contents: write

jobs:
  determine-tag:
    name: Determine Target Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get_tag.outputs.tag }}
    steps:
      - name: Determine Tag Name
        id: get_tag
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
          fi

  build-frontend:
    name: Build Frontend Assets
    runs-on: ubuntu-latest
    needs: determine-tag
    steps:
      - name: Checkout repository at main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node.js for frontend build
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package.json

      - name: Build frontend static assets
        run: |
          cd client
          npm install
          npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: client/dist

  build-apk:
    name: Build APK for ${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: [determine-tag, build-frontend]
    strategy:
      matrix:
        arch: [arm64-v8a, armeabi-v7a, x86_64]

    steps:
      - name: Checkout repository at main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: client/dist

      - name: Prepare Go embed directory
        run: |
          rm -rf cloud-clip/lib/static
          mkdir -p cloud-clip/lib/static
          cp -r client/dist/* cloud-clip/lib/static/

      - name: Install and initialize gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          export PATH=$PATH:$(go env GOPATH)/bin
          gomobile init


      # - name: List files for debugging
      #   run: |
      #     echo "--- Listing root directory contents: ---"
      #     ls -la
      #     echo "--- Listing android/ directory contents: ---"
      #     ls -la android/ || echo "android/ directory not found."

      - name: Build Go AAR package for ${{ matrix.arch }}
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          TARGET_ARCH=""
          case "${{ matrix.arch }}" in
            "arm64-v8a") TARGET_ARCH="android/arm64" ;;
            "armeabi-v7a") TARGET_ARCH="android/arm" ;;
            "x86_64") TARGET_ARCH="android/amd64" ;;
          esac
          cd cloud-clip/mobile
          gomobile bind -v -tags embed -androidapi 24 -o cloudclipservice.aar -target=$TARGET_ARCH -ldflags="-s -w" github.com/jonnyan404/cloud-clipboard-go/cloud-clip/mobile
          mkdir -p ../../android/app/libs
          cp cloudclipservice.aar ../../android/app/libs/

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode Signing Key
        run: echo "${{ secrets.SIGNING_KEY_STORE_BASE64 }}" | base64 --decode > $GITHUB_WORKSPACE/android/app/my-release-key.keystore

      - name: Make gradlew executable
        run: chmod +x ./android/gradlew

      - name: Build Android Release APK
        run: |
          cd android
          ./gradlew assembleRelease \
            -PabiFilters=${{ matrix.arch }} \
            -Psigning.key.alias=${{ secrets.SIGNING_KEY_ALIAS }} \
            -Psigning.key.password=${{ secrets.SIGNING_KEY_PASSWORD }} \
            -Psigning.store.file=$GITHUB_WORKSPACE/android/app/my-release-key.keystore \
            -Psigning.store.password=${{ secrets.SIGNING_KEY_STORE_PASSWORD }} \
            --stacktrace

      - name: List build outputs for debugging
        run: |
          echo "Listing contents of android/app/build/outputs/apk/ ..."
          ls -R android/app/build/outputs/apk/

      - name: Find and Rename APK
        run: |
          APK_PATH=$(find android/app/build/outputs/apk -type f -name "app-${{ matrix.arch }}-release.apk")
          if [ -z "$APK_PATH" ]; then echo "::error::Per-arch APK file not found!" && exit 1; fi
          echo "Found APK at: $APK_PATH"
          mv "$APK_PATH" "cloud-clipboard-go-${{ needs.determine-tag.outputs.tag }}-${{ matrix.arch }}.apk"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-per-arch-artifacts-${{ matrix.arch }}
          path: cloud-clipboard-go-${{ needs.determine-tag.outputs.tag }}-${{ matrix.arch }}.apk

  build-universal-apk:
    name: Build Universal Android APK
    runs-on: ubuntu-latest
    needs: [determine-tag, build-frontend]

    steps:
      - name: Checkout repository at main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: client/dist

      - name: Prepare Go embed directory
        run: |
          rm -rf cloud-clip/lib/static
          mkdir -p cloud-clip/lib/static
          cp -r client/dist/* cloud-clip/lib/static/

      - name: Install and initialize gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          export PATH=$PATH:$(go env GOPATH)/bin
          gomobile init

      - name: Build Go Universal AAR package
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          cd cloud-clip/mobile
          gomobile bind -v -tags embed -androidapi 24 -o cloudclipservice.aar \
            -target=android/arm,android/arm64,android/amd64 \
            -ldflags="-s -w" github.com/jonnyan404/cloud-clipboard-go/cloud-clip/mobile
          mkdir -p ../../android/app/libs
          cp cloudclipservice.aar ../../android/app/libs/

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode Signing Key
        run: echo "${{ secrets.SIGNING_KEY_STORE_BASE64 }}" | base64 --decode > $GITHUB_WORKSPACE/android/app/my-release-key.keystore

      - name: Make gradlew executable
        run: chmod +x ./android/gradlew

      - name: Build Universal Android Release APK
        run: |
          cd android
          ./gradlew assembleRelease \
            -PbuildUniversal \
            -Psigning.key.alias=${{ secrets.SIGNING_KEY_ALIAS }} \
            -Psigning.key.password=${{ secrets.SIGNING_KEY_PASSWORD }} \
            -Psigning.store.file=$GITHUB_WORKSPACE/android/app/my-release-key.keystore \
            -Psigning.store.password=${{ secrets.SIGNING_KEY_STORE_PASSWORD }} \
            --stacktrace

      - name: Find and Rename Universal APK
        run: |
          APK_PATH=$(find android/app/build/outputs/apk -type f -name "app-universal-release.apk")
          if [ -z "$APK_PATH" ]; then echo "::error::Universal APK file not found!" && exit 1; fi
          echo "Found Universal APK at: $APK_PATH"
          mv "$APK_PATH" "cloud-clipboard-go-${{ needs.determine-tag.outputs.tag }}-universal.apk"

      - name: Upload Universal APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-universal-artifact
          path: cloud-clipboard-go-${{ needs.determine-tag.outputs.tag }}-universal.apk

  # 单独的 job 用于更新 Release
  update-release:
    name: Update GitHub Release
    needs: [determine-tag, build-apk, build-universal-apk]
    runs-on: ubuntu-latest

    steps:
      - name: Download all APK artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Update Release with APKs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.determine-tag.outputs.tag }}
          files: |
            artifacts/apk-per-arch-artifacts-*/*.apk
            artifacts/apk-universal-artifact/*.apk
          prerelease: false
          draft: false