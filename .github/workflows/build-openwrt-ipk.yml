name: Build OpenWrt Packages

on:
#   push:
#     # tags:
#     #   - 'v*' # 当创建版本标签时触发
  workflow_dispatch: # 允许手动触发
    inputs:
      version:
        description: '版本号 (不含v前缀)'
        required: true
        default: '4.7.1'

permissions:
  contents: write

jobs:
  build-binaries:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.23'

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Create directory structure
        run: |
          mkdir -p openwrt/build

      - name: Build binary
        run: |
          chmod +x openwrt/scripts/build.sh
          ./openwrt/scripts/build.sh ${{ github.event.inputs.version }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-binaries-${{ github.event.inputs.version }}
          path: openwrt/build/cloud-clipboard-${{ github.event.inputs.version }}-*

  build-ipk:
    runs-on: ubuntu-latest
    needs: build-binaries
    strategy:
      matrix:
        arch: [x86_64, i386, arm_cortex-a5, arm_cortex-a7, arm_cortex-a8, arm_cortex-a9, arm_cortex-a15_neon-vfpv4, aarch64, mips_24kc, mipsel_24kc]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create directory structure
        run: |
          mkdir -p openwrt/build

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          name: openwrt-binaries-${{ github.event.inputs.version }}
          path: openwrt/build

      - name: Package IPK
        run: |
          chmod +x openwrt/scripts/package-openwrt.sh
          ./openwrt/scripts/package-openwrt.sh ${{ github.event.inputs.version }} ${{ matrix.arch }}

      - name: Upload IPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloud-clipboard_${{ github.event.inputs.version }}_${{ matrix.arch }}.ipk
          path: openwrt/build/cloud-clipboard_${{ github.event.inputs.version }}_${{ matrix.arch }}.ipk

  build-apk:
    runs-on: ubuntu-latest
    needs: build-binaries
    strategy:
      matrix:
        include:
          - binary_arch: x86_64
            apk_arch: x86_64
          - binary_arch: i386
            apk_arch: i386_pentium4
          - binary_arch: i386
            apk_arch: i386_pentium-mmx
          - binary_arch: arm_cortex-a5
            apk_arch: arm_cortex-a5_vfpv4
          - binary_arch: arm_cortex-a7
            apk_arch: arm_cortex-a7
          - binary_arch: arm_cortex-a7
            apk_arch: arm_cortex-a7_neon-vfpv4
          - binary_arch: arm_cortex-a7
            apk_arch: arm_cortex-a7_vfpv4
          - binary_arch: arm_cortex-a8
            apk_arch: arm_cortex-a8_vfpv3
          - binary_arch: arm_cortex-a9
            apk_arch: arm_cortex-a9
          - binary_arch: arm_cortex-a9
            apk_arch: arm_cortex-a9_neon
          - binary_arch: arm_cortex-a9
            apk_arch: arm_cortex-a9_vfpv3-d16
          - binary_arch: arm_cortex-a15_neon-vfpv4
            apk_arch: arm_cortex-a15_neon-vfpv4
          - binary_arch: aarch64
            apk_arch: aarch64_generic
          - binary_arch: aarch64
            apk_arch: aarch64_cortex-a53
          - binary_arch: aarch64
            apk_arch: aarch64_cortex-a72
          - binary_arch: aarch64
            apk_arch: aarch64_cortex-a76
          - binary_arch: mips_24kc
            apk_arch: mips_24kc
          - binary_arch: mipsel_24kc
            apk_arch: mipsel_24kc

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create directory structure
        run: |
          mkdir -p openwrt/build

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          name: openwrt-binaries-${{ github.event.inputs.version }}
          path: openwrt/build

      - name: Package APK
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            alpine:edge \
            sh -lc '
              chmod +x openwrt/scripts/package-openwrt-apk.sh
              ./openwrt/scripts/package-openwrt-apk.sh ${{ github.event.inputs.version }} ${{ matrix.binary_arch }} ${{ matrix.apk_arch }}
            '

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloud-clipboard-${{ github.event.inputs.version }}-${{ matrix.apk_arch }}.apk
          path: openwrt/build/cloud-clipboard-${{ github.event.inputs.version }}-${{ matrix.apk_arch }}.apk

  build-luci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create directory structure
        run: |
          mkdir -p openwrt/build
          # 设置权限，递归为所有文件增加可执行权限
          find openwrt/luci-app-cloud-clipboard -type f -exec chmod +x {} \;
      
      - name: Package LuCI IPK
        run: |
          chmod +x openwrt/scripts/package-luci-app.sh
          ./openwrt/scripts/package-luci-app.sh ${{ github.event.inputs.version }}

      - name: Package LuCI APK
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            alpine:edge \
            sh -lc '
              chmod +x openwrt/scripts/package-luci-app-apk.sh
              ./openwrt/scripts/package-luci-app-apk.sh ${{ github.event.inputs.version }}
            '
      
      - name: Upload LuCI IPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-cloud-clipboard_${{ github.event.inputs.version }}_all.ipk
          path: openwrt/build/luci-app-cloud-clipboard_${{ github.event.inputs.version }}_all.ipk

      - name: Upload LuCI APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-cloud-clipboard-${{ github.event.inputs.version }}-noarch.apk
          path: openwrt/build/luci-app-cloud-clipboard-${{ github.event.inputs.version }}-noarch.apk

  release:
    needs: [build-binaries, build-ipk, build-apk, build-luci]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.ipk
            artifacts/**/*.apk
            artifacts/**/cloud-clipboard-*
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('v{0}', github.event.inputs.version) }}
          name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('v{0}', github.event.inputs.version) }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}