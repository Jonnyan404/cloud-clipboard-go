name: Build LuCI Packages

on:
    workflow_dispatch: # 允许手动触发
      inputs:
        version:
            description: '版本号 (不含v前缀)'
            required: true
            default: '4.7.0'

jobs:
  build-luci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Create directory structure and set permissions
        run: |
          mkdir -p openwrt/build
          # 设置权限，递归为所有文件增加可执行权限
          find openwrt/luci-app-cloud-clipboard -type f -exec chmod +x {} \;
      
      
      - name: Package LuCI App
        run: |
          chmod +x openwrt/scripts/package-luci-app.sh
          ./openwrt/scripts/package-luci-app.sh ${{ github.event.inputs.version }}

      - name: Package LuCI APK
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            alpine:edge \
            sh -lc '
              apk add --no-cache bash >/dev/null
              chmod +x openwrt/scripts/package-luci-app-apk.sh
              bash ./openwrt/scripts/package-luci-app-apk.sh ${{ github.event.inputs.version }}
            '
      
      - name: Upload LuCI IPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-cloud-clipboard_${{ github.event.inputs.version }}_all.ipk
          path: openwrt/build/luci-app-cloud-clipboard_${{ github.event.inputs.version }}_all.ipk

      - name: Upload LuCI APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-cloud-clipboard-${{ github.event.inputs.version }}-noarch.apk
          path: openwrt/build/luci-app-cloud-clipboard-${{ github.event.inputs.version }}-noarch.apk